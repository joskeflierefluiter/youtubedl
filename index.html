<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kevin's Youtube to video/mp3</title>
    <style>
      :root {
        --bg-1: #0f172a;
        --bg-2: #1e293b;
        --card: rgba(15, 23, 42, 0.8);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --accent-hover: #06b6d4;
        --danger: #f87171;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #0ea5e9 0%, transparent 35%),
          radial-gradient(circle at bottom left, #22d3ee 0%, transparent 30%),
          linear-gradient(160deg, var(--bg-1), var(--bg-2));
      }

      .card {
        width: min(90vw, 680px);
        padding: 2rem;
        border-radius: 18px;
        background: var(--card);
        border: 1px solid rgba(148, 163, 184, 0.2);
        backdrop-filter: blur(6px);
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.4);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 3.2vw, 2.2rem);
        letter-spacing: 0.02em;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 0.6rem;
      }

      .brand-logo {
        width: 38px;
        height: 28px;
        flex: 0 0 auto;
      }

      .brand-main {
        color: #ffffff;
        font-weight: 800;
      }

      .brand-youtube {
        color: #ff0033;
        font-weight: 800;
      }

      .brand-tail {
        color: #facc15;
        font-weight: 700;
      }

      p.subtitle {
        margin: 0 0 1.4rem;
        color: var(--muted);
      }

      .controls {
        display: grid;
        gap: 0.9rem;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.8rem;
      }

      .ghost {
        color: #e2e8f0;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(148, 163, 184, 0.4);
      }

      .ghost:hover {
        background: rgba(15, 23, 42, 0.55);
      }

      input {
        width: 100%;
        padding: 0.9rem 1rem;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.65);
        color: var(--text);
        font-size: 1rem;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 0.95rem 1rem;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #082f49;
        background: var(--accent);
        cursor: pointer;
        transition: transform 0.12s ease, background-color 0.2s ease;
      }

      button:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      #status {
        min-height: 1.5rem;
        margin-top: 1rem;
        color: var(--muted);
      }

      #status.error {
        color: var(--danger);
      }

      #status.success {
        color: #4ade80;
      }

      #filePreview {
        margin-top: 0.8rem;
        color: #bfdbfe;
        min-height: 1.4rem;
      }

      .progressWrap {
        margin-top: 0.35rem;
      }

      #progressBar {
        width: 100%;
        height: 12px;
      }

      #progressText {
        margin-top: 0.5rem;
        min-height: 1.2rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      @media (max-width: 640px) {
        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 90 64" aria-hidden="true" focusable="false">
          <rect x="1" y="1" width="88" height="62" rx="14" fill="#ff0033"></rect>
          <polygon points="37,20 37,44 58,32" fill="#ffffff"></polygon>
        </svg>
        <h1>
          <span class="brand-main">Kevin's</span>
          <span class="brand-youtube">Youtube</span>
          <span class="brand-tail">to video/mp3</span>
        </h1>
      </div>
      <p class="subtitle">Download YouTube-video's direct naar je Downloads-map.</p>

      <section class="controls">
        <input id="urlInput" type="url" placeholder="Plak hier je YouTube URL" autocomplete="off" />
        <div class="actions">
          <button id="downloadBtn">Download als MP4</button>
          <button id="audioBtn" class="ghost">Download als MP3</button>
        </div>
      </section>

      <p id="filePreview" aria-live="polite"></p>
      <div class="progressWrap">
        <progress id="progressBar" max="100" value="0"></progress>
        <p id="progressText" aria-live="polite"></p>
      </div>
      <p id="status" aria-live="polite"></p>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
