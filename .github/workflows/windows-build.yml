name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (retry once)
        shell: pwsh
        run: |
          if (Test-Path build.log) { Remove-Item build.log -Force }
          $attempts = 2
          for ($i = 1; $i -le $attempts; $i++) {
            Write-Host "Build attempt $i/$attempts"
            npm run build:win *>&1 | Tee-Object -FilePath build.log -Append
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -lt $attempts) {
              Write-Host "Build failed, retrying in 10 seconds..."
              Start-Sleep -Seconds 10
            }
          }
          exit 1

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VideoGrabber-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: VideoGrabber-windows-debug
          path: |
            build.log
            release/builder-debug.yml
            release/builder-effective-config.yaml
          if-no-files-found: warn
