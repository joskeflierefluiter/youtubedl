name: Build And Publish Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (example: v1.0.0)
        required: true
      release_name:
        description: Release name
        required: true
        default: VideoGrabber Windows Release
      prerelease:
        description: "Use true for prerelease, false for stable"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (retry once)
        shell: pwsh
        run: |
          if (Test-Path build.log) { Remove-Item build.log -Force }
          $attempts = 2
          for ($i = 1; $i -le $attempts; $i++) {
            Write-Host "Build attempt $i/$attempts"
            npm run build:win *>&1 | Tee-Object -FilePath build.log -Append
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -lt $attempts) {
              Write-Host "Build failed, retrying in 10 seconds..."
              Start-Sleep -Seconds 10
            }
          }
          exit 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoGrabber-windows-release
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: VideoGrabber-windows-release-debug
          path: |
            build.log
            release/builder-debug.yml
            release/builder-effective-config.yaml
          if-no-files-found: warn

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease == 'true' }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
