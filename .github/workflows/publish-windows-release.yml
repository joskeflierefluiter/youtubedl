name: Build And Publish Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (example: v1.0.0)
        required: true
      release_name:
        description: Release name
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (Test-Path build.log) { Remove-Item build.log -Force }
          npm run build:win *>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoGrabber-windows-release
          path: |
            build.log
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.release_name }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
